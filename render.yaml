# Render Deployment Configuration
# Define services so Render can run web + background workers

services:
  - type: web
    name: media-conversion-web
    env: python
    runtime: python-3.11.7
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  - type: worker
    name: fetcher
    env: python
    runtime: python-3.11.7
    startCommand: python -u fetcher/service.py

  - type: worker
    name: telethon-ingest
    env: python
    runtime: python-3.11.7
    startCommand: python -u tools/telethon_ingest.py
