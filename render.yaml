# Render Deployment Configuration
# Define services so Render can run web + background workers

services:
  - type: web
    name: media-conversion-web
    env: python
    runtime: python-3.11.7
    # Ensure AUTO_FETCH_FORWARDS is enabled so the web process publishes
    # lightweight fetch requests when forward metadata is saved. Sensitive
    # secrets (REDIS_URL, S3 credentials, TELETHON_SESSION) should be set
    # via Render dashboard environment variables / secrets rather than
    # checked into source control.
    #
    # NOTE: The web service now also runs an in-process ffmpeg worker task
    # (via create_worker_task in main.py) so jobs are processed whenever
    # this service is awake. This is critical for Render free tier where
    # separate worker services also spin down after inactivity.
    #
    # KEEP-ALIVE: The web service has a built-in keep-alive heartbeat
    # that pings its own /health endpoint every 10 minutes (configurable
    # via KEEP_ALIVE_INTERVAL env var). This prevents Render's free tier
    # from spinning down the service due to inactivity.
    #
    # The heartbeat URL is auto-detected from RENDER_EXTERNAL_URL env var
    # (set automatically by Render) or falls back to WEBHOOK_URL parsing.
    # You can also explicitly set KEEP_ALIVE_URL to override.
    #
    # Additionally, the bot webhook is NOT deleted on shutdown, so Telegram
    # can wake the service if it ever does spin down.
    #
    # To disable the keep-alive (e.g., if you upgrade to a paid plan),
    # set KEEP_ALIVE_DISABLED=1 in environment variables.
    envVars:
      - key: AUTO_FETCH_FORWARDS
        value: "1"
      - key: BOT_API_MAX_MB
        value: "50"
    startCommand: /app/start.sh

  - type: worker
    name: ffmpeg-worker
    env: python
    runtime: python-3.11.7
    # Dedicated ffmpeg worker that processes conversion jobs from Redis.
    # This runs as a background worker service that stays alive as long
    # as jobs are being processed. On Render free tier, it may spin down
    # after inactivity, but the in-process worker in the web service
    # (above) will take over when the web service wakes up.
    envVars:
      - key: BOT_API_MAX_MB
        value: "50"
    startCommand: python -u -m workers.ffmpeg_worker

  - type: worker
    name: fetcher
    env: python
    runtime: python-3.11.7
    # Fetcher service should also be prepared to receive HTTP trigger
    # requests that enqueue fetches. AUTO_FETCH_FORWARDS here helps in
    # some deployment models where the fetcher republishes or reacts.
    envVars:
      - key: AUTO_FETCH_FORWARDS
        value: "1"
      - key: BOT_API_MAX_MB
        value: "50"
    startCommand: python -u fetcher/service.py

  - type: worker
    name: telethon-ingest
    env: python
    runtime: python-3.11.7
    # Telethon ingest worker: ensure remote deploy exposes TELETHON_SESSION
    # or TELETHON_SESSION_NAME in the service env. Set TELETHON_SESSION
    # (StringSession) as a secret in Render to allow the userbot to run.
    envVars:
      - key: ENABLE_TELETHON_INGEST
        value: "1"
      - key: BOT_API_MAX_MB
        value: "50"
      - key: TELETHON_DEBUG_PORT
        value: "8081"
      - key: TELETHON_DEBUG_TOKEN
        value: "REPLACE_WITH_SECRET"
      - key: TELETHON_LISTEN_INCOMING
        value: "1"
      - key: TEMP_UPLOAD_DIR
        value: "/tmp/telethon_uploads"
    startCommand: python -u tools/telethon_ingest.py
